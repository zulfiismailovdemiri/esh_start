name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Bootstrap (fetch esh_vendors)
        run: go run ./bootstrap/

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o esh .

      - name: Package
        run: |
          tar -czf esh_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz esh

      - uses: softprops/action-gh-release@v2
        with:
          files: esh_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
